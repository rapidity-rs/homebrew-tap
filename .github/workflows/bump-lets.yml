name: Bump lets formula

on:
  workflow_dispatch:
  schedule:
    - cron: "23 6 * * *"

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump formula to latest lets release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="$(gh release view --repo rapidity-rs/lets --json tagName --jq '.tagName' | sed 's/^v//')"
          CURRENT="$(sed -n 's#.*/download/v\([0-9][0-9.]*\)/.*#\1#p' Formula/lets.rb | head -1)"
          echo "latest=${VERSION} current=${CURRENT:-none}"
          if [ "${VERSION}" = "${CURRENT}" ]; then
            echo "Formula already at v${VERSION}; nothing to do."
            exit 0
          fi

          BASE="https://github.com/rapidity-rs/lets/releases/download/v${VERSION}"
          tmp="$(mktemp -d)"
          declare -A SHA
          for target in \
            aarch64-apple-darwin \
            x86_64-apple-darwin \
            aarch64-unknown-linux-gnu \
            x86_64-unknown-linux-gnu; do
            curl -fsSL "${BASE}/lets-${target}.tar.gz" -o "${tmp}/${target}.tar.gz"
            SHA[$target]="$(sha256sum "${tmp}/${target}.tar.gz" | cut -d' ' -f1)"
          done

          cat > Formula/lets.rb <<EOF
          class Lets < Formula
            desc "Declarative CLI builder — define commands in KDL, get a CLI instantly"
            homepage "https://github.com/rapidity-rs/lets"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE}/lets-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA[aarch64-apple-darwin]}"
              end
              on_intel do
                url "${BASE}/lets-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA[x86_64-apple-darwin]}"
              end
            end

            on_linux do
              on_arm do
                url "${BASE}/lets-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA[aarch64-unknown-linux-gnu]}"
              end
              on_intel do
                url "${BASE}/lets-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA[x86_64-unknown-linux-gnu]}"
              end
            end

            def install
              bin.install "lets"
            end

            test do
              assert_match "lets #{version}", shell_output("#{bin}/lets --version")
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/lets.rb
          git commit -m "chore: bump lets to ${VERSION}"
          git push
